name: QuitMate
description: 戒烟戒酒综合干预应用 - 纯离线版
version: 1.8.0+9
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 本地数据库
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # 加密存储
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.0

  # 本地通知
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0

  # 文件/分享/导出
  share_plus: ^7.0.0

  # 路由
  go_router: ^14.0.0

  # 桌面小组件
  home_widget: ^0.7.0

  # HTTP客户端（LLM集成）
  http: ^1.1.0

  # 工具库
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/content/assessments/
    - assets/brand/badges/