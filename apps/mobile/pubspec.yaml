name: QuitMate
description: 戒烟戒酒综合干预应用 - 纯离线版
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4

  # 本地数据库
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # 加密存储
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3

  # 本地通知
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.3

  # 文件/分享/导出
  share_plus: ^10.0.2
  open_filex: ^4.4.0
  pdf: ^3.11.0
  printing: ^5.13.0
  csv: ^6.0.0
  archive: ^3.6.10

  # 音频播放
  just_audio: ^0.9.36
  audio_session: ^0.1.19

  # 工具库
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  go_router: ^14.2.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.3
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/content/
    - assets/content/courses/
    - assets/content/courses/stage1_awakening/
    - assets/content/courses/stage2_action/
    - assets/content/courses/stage3_maintenance/
    - assets/content/assessments/
    - assets/content/urge_toolkit/
    - assets/content/lifestyle/
    - assets/brand/
    - assets/legal/