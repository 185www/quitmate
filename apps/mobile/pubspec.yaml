name: QuitMate
description: 戒烟戒酒综合干预应用 - 纯离线版
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 本地数据库
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # 加密存储
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.0

  # 本地通知
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0

  # 文件/分享/导出
  share_plus: ^7.0.0
  pdf: ^3.10.0
  printing: ^5.12.0
  csv: ^6.0.0

  # 音频播放
  just_audio: ^0.9.36

  # 路由
  go_router: ^14.0.0

  # 工具库
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/content/
    - assets/content/courses/
    - assets/content/courses/stage1_awakening/
    - assets/content/courses/stage2_action/
    - assets/content/courses/stage3_maintenance/
    - assets/content/assessments/
    - assets/content/urge_toolkit/
    - assets/content/lifestyle/
    - assets/brand/
    - assets/legal/